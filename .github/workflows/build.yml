name: Build

on:
  push:
  pull_request:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libglfw3-dev libgl1-mesa-dev \
            libiio-dev libhackrf-dev libfftw3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DIQFORGE_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: iqforge-linux-x86_64
          path: build/src/iqforge

  release:
    needs: build-linux-x86_64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: iqforge-linux-x86_64
          path: dist

      - name: Rename binary
        run: mv dist/iqforge dist/iqforge-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iqforge-linux-x86_64
