name: Build

on:
  push:
  pull_request:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config dpkg-dev wget \
            libglfw3-dev libgl1-mesa-dev \
            libiio-dev libhackrf-dev libfftw3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DIQFORGE_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Create Debian package
        run: cpack --config build/CPackConfig.cmake -G DEB

      - name: Install AppImageTool
        run: |
          wget -O appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppImage
        run: |
          mkdir -p dist-appimage
          mkdir -p appimage-root/usr/bin
          cp build/src/iqforge appimage-root/usr/bin/iqforge
          mkdir -p appimage-root/usr/share/applications
          mkdir -p appimage-root/usr/share/doc/iqforge
          cat > appimage-root/usr/share/applications/iqforge.desktop <<'EOF'
          [Desktop Entry]
          Name=iqforge
          Exec=iqforge
          Icon=iqforge
          Type=Application
          Categories=Utility;
          EOF
          cp appimage-root/usr/share/applications/iqforge.desktop appimage-root/iqforge.desktop
          mkdir -p appimage-root/usr/share/icons/hicolor/256x256/apps
          cp assets/iqforge.png appimage-root/usr/share/icons/hicolor/256x256/apps/iqforge.png
          cp assets/iqforge.png appimage-root/iqforge.png
          ln -s usr/bin/iqforge appimage-root/AppRun
          cp README.md appimage-root/usr/share/doc/iqforge/README
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run appimage-root dist-appimage/iqforge.AppImage

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: iqforge-linux-x86_64
          path: build/src/iqforge

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: iqforge-deb-x86_64
          path: ./*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: iqforge-appimage-x86_64
          path: dist-appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install ninja
          choco install pkgconfiglite

      - name: Install vcpkg
        uses: johnwason/vcpkg-action@v6
        id: vcpkg
        with:
          pkgs: glfw3 gl3w fftw3 libusb
          triplet: x64-windows
          token: ${{ github.token }}

      - name: Configure
        env:
          PKG_CONFIG_PATH: ${{ env.VCPKG_ROOT }}\installed\x64-windows\lib\pkgconfig
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DIQFORGE_BUILD_TESTS=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: iqforge-windows-x86_64
          path: build/Release/iqforge.exe

  release:
    needs: [build-linux-x86_64, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: iqforge-linux-x86_64
          path: dist

      - name: Download Debian package
        uses: actions/download-artifact@v4
        with:
          name: iqforge-deb-x86_64
          path: dist-deb

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: iqforge-appimage-x86_64
          path: dist-appimage

      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: iqforge-windows-x86_64
          path: dist-windows

      - name: Prepare release files
        run: |
          mv dist/iqforge dist/iqforge-linux-x86_64
          cp dist-deb/*.deb dist/
          cp dist-appimage/*.AppImage dist/
          mv dist-windows/iqforge.exe dist/iqforge-windows-x86_64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/iqforge-linux-x86_64
            dist/*.deb
            dist/*.AppImage
            dist/iqforge-windows-x86_64.exe
