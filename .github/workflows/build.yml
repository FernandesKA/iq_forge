name: Build

on:
  push:
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install ninja
          
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install vcpkg
        uses: johnwason/vcpkg-action@v6
        with:
          pkgs: glfw3 gl3w libiio hackrf fftw3
          triplet: x64-windows

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DIQFORGE_BUILD_TESTS=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: iqforge-windows-x86_64
          path: build/Release/iqforge.exe

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: iqforge-windows-x86_64
          path: dist

      - name: Prepare release files
        run: |
          mv dist/iqforge.exe dist/iqforge-windows-x86_64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/iqforge-windows-x86_64.exe
